services:

  app:
    build:
      context: .
      args:
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
    restart: unless-stopped
    ports:
      - "3002:3001"
    env_file:
      - ./server/.env
    environment:
      DB_HOST:     ${DB_HOST:-postify-mariadb}
      DB_PORT:     ${DB_PORT:-3306}
      DB_NAME:     ${DB_NAME:-postify}
      DB_USER:     ${DB_USER:-postify}
      DB_PASSWORD: ${DB_PASSWORD:-postifysecret}

# MariaDB runs as a separate standalone container (postify-mariadb)
# managed outside this compose file so Coolify doesn't recreate it on every deploy.
# To start it locally:
#   docker run -d --name postify-mariadb \
#     -e MARIADB_ROOT_PASSWORD=rootsecret \
#     -e MARIADB_DATABASE=postify \
#     -e MARIADB_USER=postify \
#     -e MARIADB_PASSWORD=postifysecret \
#     -v postify-mariadb-data:/var/lib/mysql \
#     mariadb:11
